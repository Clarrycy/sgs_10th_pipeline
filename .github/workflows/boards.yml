name: Boards Pipeline

on:
  schedule:
    # 每 1 小时跑一次（榜单线）
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: sgs-collect
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pull state from R2
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python pipeline/sync_r2.py --pull

      - name: Collect GameIDs (boards)
        env:
          SGS_ACCOUNTS:   ${{ secrets.SGS_ACCOUNTS || secrets.SGS_ACCOUNT }}
          SGS_PASSWORDS:  ${{ secrets.SGS_PASSWORDS || secrets.SGS_PASSWORD }}
          KEEP_MODES:     '4,8,36'
          PROVINCE_MAX:   '33'
          REQUEST_DELAY:  '300'
        run: node collect/collect.js --mode=boards

      - name: Merge indexes
        run: python pipeline/merge_indexes.py

      - name: Download replays
        run: python pipeline/download.py --use-indexes --days=7

      - name: Reparse missing replays
        run: python pipeline/download.py --reparse --days=7

      - name: Parse 2v2
        run: python pipeline/parse_2v2.py --quiet --update-index

      - name: Parse Doudizhu
        run: python pipeline/parse_doudizhu.py --quiet --update-index

      - name: Enrich escaped player ranks
        env:
          SGS_ACCOUNTS:   ${{ secrets.SGS_ACCOUNTS || secrets.SGS_ACCOUNT }}
          SGS_PASSWORDS:  ${{ secrets.SGS_PASSWORDS || secrets.SGS_PASSWORD }}
          REQUEST_DELAY:  '300'
        run: python pipeline/enrich_ranks.py

      - name: Export CSV from DB
        run: python pipeline/export_csv.py

      - name: Push results to R2
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python pipeline/sync_r2.py --push

      - name: Cleanup old data
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python pipeline/sync_r2.py --cleanup
          python pipeline/download.py --cleanup --days=30
