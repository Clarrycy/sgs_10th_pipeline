name: Daily Pipeline

on:
  schedule:
    # 每 2 小时跑一次
    # 账号按当前小时对账号数取模轮替，支持任意数量账号
    - cron: '0 */2 * * *'
  workflow_dispatch:        # 支持手动触发

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js（Puppeteer 采集）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      # ── Python（下载 + 解析 + 同步）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 从 R2 拉取状态（output/ + indexes/ + cache/）
      - name: Pull state from R2
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python pipeline/sync_r2.py --pull

      # ── Puppeteer 采集：官阶榜 + 省级排位 + 省级身份排位 + 好友推荐 → GameID
      #    榜单每日自动缓存（data/cache/boards_*.json），好友每次重新刷
      - name: Collect GameIDs
        env:
          SGS_ACCOUNTS:   ${{ secrets.SGS_ACCOUNTS || secrets.SGS_ACCOUNT }}
          SGS_PASSWORDS:  ${{ secrets.SGS_PASSWORDS || secrets.SGS_PASSWORD }}
          KEEP_MODES:     '4,8,36'
          PROVINCE_MAX:   '33'
          FRIEND_ROUNDS:  '300'
          REQUEST_DELAY:  '300'
        run: node collect/collect.js

      # ── 合并索引 + 连续对局检测
      - name: Merge indexes
        run: python pipeline/merge_indexes.py

      # ── 下载录像（从索引读取，跳过身份 mode 4，只取最近 7 天）
      - name: Download replays
        run: python pipeline/download.py --use-indexes --days=7

      # ── 解析 + 回写 parsed 到 index JSON
      - name: Parse 2v2
        run: python pipeline/parse_2v2.py --quiet --update-index

      - name: Parse Doudizhu
        run: python pipeline/parse_doudizhu.py --quiet --update-index

      # ── 逃跑玩家官阶补全（parse 后、push 前）
      - name: Enrich escaped player ranks
        env:
          SGS_ACCOUNTS:   ${{ secrets.SGS_ACCOUNTS || secrets.SGS_ACCOUNT }}
          SGS_PASSWORDS:  ${{ secrets.SGS_PASSWORDS || secrets.SGS_PASSWORD }}
          REQUEST_DELAY:  '300'
        run: python pipeline/enrich_ranks.py

      # ── 上传结果回 R2（output/ + indexes/ + cache/）
      - name: Push results to R2
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python pipeline/sync_r2.py --push

      # ── 清理过期数据（R2 + 本地）
      - name: Cleanup old data
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python pipeline/sync_r2.py --cleanup
          python pipeline/download.py --cleanup --days=30
