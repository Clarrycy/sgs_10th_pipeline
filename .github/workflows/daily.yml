name: Daily Pipeline

on:
  schedule:
    - cron: '0 18 * * *'   # 每天 UTC 18:00 = 北京时间次日 02:00
  workflow_dispatch:        # 支持手动触发

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js（Puppeteer 采集）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      # ── Python（下载 + 解析 + 同步）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 从 R2 拉取上次的 index.csv + 解析结果（增量去重用）
      - name: Pull state from R2
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python pipeline/sync_r2.py --pull

      # ── Puppeteer 全自动采集：排行榜 UserID → GameID
      - name: Collect GameIDs
        env:
          GAME_COOKIES: ${{ secrets.GAME_COOKIES }}
          KEEP_MODES:   '8,36'
          PROVINCE_MAX: '33'
          REQUEST_DELAY: '350'
        run: node collect/collect.js

      # ── 下载录像（只取最近 7 天，与服务器保留期一致）
      - name: Download replays
        run: python pipeline/download.py --days=7 --modes=8,36

      # ── 解析
      - name: Parse 2v2
        run: python pipeline/parse_2v2.py --quiet

      - name: Parse Doudizhu
        run: python pipeline/parse_doudizhu.py --quiet

      # ── 上传结果回 R2
      - name: Push results to R2
        env:
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python pipeline/sync_r2.py --push

      # ── 清理 runner 上的 .sgs（runner 不持久，本步防止磁盘撑满）
      - name: Cleanup replays
        run: python pipeline/download.py --cleanup --days=1
